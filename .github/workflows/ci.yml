name: CI Pipeline - Deadline

# Configura para rodar em todo PR para a main ou push direto na main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job de testes do Backend (Spring Boot)
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven # ou 'gradle' se estiver usando Gradle

      - name: Rodar testes e build do Backend (Maven)
        run: |
          cd Backend/deadline
          mvn clean verify
          
